<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>{{QUERY}} — Search</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Inter', system-ui, sans-serif; }
  .result-link { color: #1a0dab; }
  .result-link:hover { text-decoration: underline; }
</style>
</head>
<body class="bg-white text-slate-800">
  <header class="border-b border-slate-200 sticky top-0 bg-white z-10">
    <div class="max-w-5xl mx-auto px-5 py-3 flex items-center gap-4">
      <div class="text-2xl font-bold tracking-tight">
        <span class="text-blue-600">F</span><span class="text-rose-500">i</span><span class="text-amber-400">n</span><span class="text-blue-600">d</span><span class="text-emerald-500">l</span><span class="text-rose-500">y</span>
      </div>
      <div class="flex items-center flex-1 max-w-xl border border-slate-300 rounded-full px-4 py-2 shadow-sm">
        <span class="text-slate-400 mr-2">🔍</span>
        <input class="flex-1 outline-none text-sm" value="{{QUERY}}" data-target="search_input"/>
        <span class="text-slate-400 ml-2">🎤</span>
      </div>
      <div class="ml-auto w-9 h-9 rounded-full bg-gradient-to-br from-blue-500 to-emerald-500 text-white flex items-center justify-center text-sm font-semibold">JD</div>
    </div>
    <nav class="max-w-5xl mx-auto px-5 flex gap-5 text-sm text-slate-600">
      <a class="border-b-2 border-blue-600 pb-2 text-blue-700" data-target="tab_all">All</a>
      <a class="pb-2 hover:text-slate-900" data-target="tab_images">Images</a>
      <a class="pb-2 hover:text-slate-900" data-target="tab_videos">Videos</a>
      <a class="pb-2 hover:text-slate-900" data-target="tab_news">News</a>
      <a class="pb-2 hover:text-slate-900" data-target="tab_maps">Maps</a>
      <a class="pb-2 hover:text-slate-900" data-target="tab_shopping">Shopping</a>
    </nav>
  </header>

  <main class="max-w-2xl mx-auto px-5 py-4">
    <div class="text-xs text-slate-500 mb-3">About 4,820,000 results (0.42 seconds)</div>

    <div class="space-y-5" id="results"></div>
  </main>

  <script>
    // results array filled at render time
    const RESULTS = {{RESULTS_JSON}};
    const out = document.getElementById('results');
    RESULTS.forEach((r, i) => {
      const div = document.createElement('div');
      div.setAttribute('data-target', 'result_' + (i+1));
      div.className = 'group';
      const host = (r.url||'').replace(/^https?:\/\//,'').split('/')[0];
      div.innerHTML = `
        <div class="flex items-center gap-2 text-xs text-slate-600">
          <div class="w-5 h-5 rounded-full bg-slate-200 border border-slate-300 flex items-center justify-center text-[10px] font-semibold">${host.charAt(0).toUpperCase()}</div>
          <span>${host}</span>
          <span class="text-slate-400">›</span>
          <span class="truncate">${(r.url||'').replace(/^https?:\/\/[^/]+/, '')}</span>
        </div>
        <a href="${r.url}" class="result-link text-xl font-medium block mt-0.5">${r.title}</a>
        <div class="text-sm text-slate-700 mt-0.5">${r.snippet}</div>
      `;
      out.appendChild(div);
    });
  </script>
</body>
</html>
