<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>{{LIST_TITLE}}</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style> body { font-family: 'Inter', system-ui, sans-serif; } </style>
</head>
<body class="bg-amber-50 text-slate-800">
  <div class="flex h-screen">
    <aside class="w-56 bg-white border-r border-amber-200 flex flex-col text-sm">
      <div class="px-4 py-3 border-b border-amber-200 flex items-center gap-2">
        <div class="w-8 h-8 rounded bg-emerald-500 text-white font-bold flex items-center justify-center">L</div>
        <div class="font-semibold">Lists</div>
      </div>
      <button class="mx-3 my-3 px-3 py-2 bg-emerald-600 text-white rounded text-sm font-medium" data-target="new_list_btn">+ New list</button>
      <nav class="text-sm">
        <a class="block px-4 py-1.5 bg-emerald-50 text-emerald-800 font-medium border-l-2 border-emerald-500" data-target="list_groceries">Groceries</a>
        <a class="block px-4 py-1.5 hover:bg-amber-50" data-target="list_costco">Costco</a>
        <a class="block px-4 py-1.5 hover:bg-amber-50" data-target="list_hardware">Hardware</a>
        <a class="block px-4 py-1.5 hover:bg-amber-50" data-target="list_party">Birthday party</a>
      </nav>
    </aside>

    <main class="flex-1 overflow-y-auto p-8">
      <div class="max-w-xl">
        <h1 class="text-2xl font-semibold" data-target="list_title">{{LIST_TITLE}}</h1>
        <div class="text-xs text-slate-500">8 items · last updated 3h ago</div>

        <section class="mt-5 bg-white border border-amber-200 rounded-lg shadow-sm p-5">
          <label class="block text-xs uppercase tracking-wider text-slate-500 mb-1">Add an item</label>
          <div class="relative">
            <input class="w-full border border-slate-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-200 focus:border-emerald-400" placeholder="e.g. apples" data-target="add_item_input"/>
            <button class="absolute top-1/2 right-1 -translate-y-1/2 px-3 py-1 bg-emerald-600 text-white rounded text-xs" data-target="add_item_btn">Add</button>
          </div>

          <ul class="mt-4 divide-y divide-amber-100 text-sm">
            <li class="flex items-center gap-3 py-2"><input type="checkbox" class="rounded border-slate-300"/><span>Whole-wheat bread</span><span class="ml-auto text-xs text-slate-400">x1</span></li>
            <li class="flex items-center gap-3 py-2"><input type="checkbox" class="rounded border-slate-300" checked/><span class="line-through text-slate-400">Olive oil (extra-virgin)</span><span class="ml-auto text-xs text-slate-400">x1</span></li>
            <li class="flex items-center gap-3 py-2"><input type="checkbox" class="rounded border-slate-300"/><span>Tomatoes</span><span class="ml-auto text-xs text-slate-400">x6</span></li>
            <li class="flex items-center gap-3 py-2"><input type="checkbox" class="rounded border-slate-300"/><span>Spinach</span><span class="ml-auto text-xs text-slate-400">x2 bunches</span></li>
            <li class="flex items-center gap-3 py-2"><input type="checkbox" class="rounded border-slate-300"/><span>Eggs</span><span class="ml-auto text-xs text-slate-400">x12</span></li>
            <li class="flex items-center gap-3 py-2"><input type="checkbox" class="rounded border-slate-300" checked/><span class="line-through text-slate-400">Milk (oat)</span><span class="ml-auto text-xs text-slate-400">x1</span></li>
            <li class="flex items-center gap-3 py-2"><input type="checkbox" class="rounded border-slate-300"/><span>Coffee beans (medium roast)</span><span class="ml-auto text-xs text-slate-400">x1 bag</span></li>
            <li class="flex items-center gap-3 py-2"><input type="checkbox" class="rounded border-slate-300"/><span>Yogurt (plain Greek)</span><span class="ml-auto text-xs text-slate-400">x4</span></li>
          </ul>
        </section>
      </div>
    </main>
  </div>
</body>
</html>
